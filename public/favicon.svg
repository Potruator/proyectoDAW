<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo circular -->
  <circle cx="50" cy="50" r="48" fill="#1F2937" stroke="#F59E0B" stroke-width="3"/>
  
  <!-- Taza de café -->
  <g transform="translate(50, 50)">
    <!-- Cuerpo de la taza -->
    <path d="M -15 -5 L -15 15 C -15 20 -10 25 0 25 C 10 25 15 20 15 15 L 15 -5 Z" 
          fill="#F59E0B" 
          stroke="#D97706" 
          stroke-width="2"/>
    
    <!-- Asa de la taza -->
    <path d="M 15 0 Q 25 0 25 10 Q 25 20 15 20" 
          fill="none" 
          stroke="#F59E0B" 
          stroke-width="3" 
          stroke-linecap="round"/>
    
    <!-- Vapor (3 líneas curvas) -->
    <path d="M -8 -10 Q -8 -18 -5 -22" 
          fill="none" 
          stroke="#F59E0B" 
          stroke-width="2" 
          stroke-linecap="round" 
          opacity="0.8"/>
    <path d="M 0 -10 Q 0 -20 3 -25" 
          fill="none" 
          stroke="#F59E0B" 
          stroke-width="2" 
          stroke-linecap="round" 
          opacity="0.8"/>
    <path d="M 8 -10 Q 8 -18 11 -22" 
          fill="none" 
          stroke="#F59E0B" 
          stroke-width="2" 
          stroke-linecap="round" 
          opacity="0.8"/>
  </g>
</svg>